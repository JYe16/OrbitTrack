app-id: io.github.caldavtimetrack
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: caldav-time-track-gtk

finish-args:
  # Wayland (primary, GNOME 49 / Fedora 43)
  - --socket=wayland
  # XWayland fallback
  - --socket=fallback-x11
  - --device=dri
  # CalDAV network access
  - --share=network
  # Persist credentials under XDG_CONFIG_HOME
  - --filesystem=xdg-config/caldav-time-track:create

build-options:
  env:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"

modules:
  # Python dependencies – generated by generate-flatpak-sources.sh
  # Run ./generate-flatpak-sources.sh to produce python3-deps.yaml,
  # then uncomment the next line:
  # - python3-deps.yaml

  # ── Application ──────────────────────────────────────────────────────────
  - name: caldav-time-track-gtk
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --no-deps --prefix=${FLATPAK_DEST} .
      - install -Dm644 io.github.caldavtimetrack.desktop
            ${FLATPAK_DEST}/share/applications/io.github.caldavtimetrack.desktop
      - install -Dm644 io.github.caldavtimetrack.metainfo.xml
            ${FLATPAK_DEST}/share/metainfo/io.github.caldavtimetrack.metainfo.xml
      - install -Dm644 data/io.github.caldavtimetrack.svg
            ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.caldavtimetrack.svg
    sources:
      - type: dir
        path: .
